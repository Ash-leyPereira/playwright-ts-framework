<!DOCTYPE html>
<html>
<head>
<title>Automation Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Automation Trend</h2>

<canvas id="trendChart"></canvas>

<script>

fetch("history.json")
.then(res => res.json())
.then(data => {

const labels = data.map(r => r.date)
const passRate = data.map(r => r.passRate)

new Chart(
document.getElementById("trendChart"),
{
type: "line",
data: {
labels: labels,
datasets: [{
label: "Pass Rate %",
data: passRate
}]
}
}

)

})

</script>

</body>
</html>
