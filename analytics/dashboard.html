<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Playwright QA Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@2.9.0/dist/dom-to-image-more.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Segoe UI,system-ui;
background:linear-gradient(135deg,#eef2ff,#f0f9ff,#ecfeff);
color:#1f2937;
min-height:100vh;
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px)}
to{opacity:1; transform:translateY(0)}
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 24px;

backdrop-filter:blur(12px);
background:linear-gradient(90deg,#4f46e5,#3b82f6);
color:white;
border-bottom:none;

position:sticky;
top:0;
z-index:100;
}

.title{
font-size:20px;
font-weight:600;
}

.controls{
display:flex;
gap:12px;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.dropdown-btn{
padding:8px 14px;

border-radius:10px;

border:1px solid #c7d2fe;

background:#eef2ff;
color:#1e3a8a;

backdrop-filter:blur(10px);

cursor:pointer;
font-size:13px;

transition:all .2s;
display:flex;
align-items:center;
gap:6px;
}

.dropdown-btn:hover{
background:#e0e7ff;
}

.dropdown-menu{
display:none;
position:absolute;
top:42px;
right:0;
background:white;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
overflow:hidden;
min-width:180px;
}

.dropdown.open .dropdown-menu{
display:block;
}

.dropdown-menu button{
width:100%;
border:none;
background:#e0e7ff;
padding:10px 14px;
cursor:pointer;
text-align:left;
cursor:pointer;
}

.dropdown-menu button:hover{
background:#f4f6fb;
}

/* KPI */

.kpis{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:24px;
margin-top:10px;
}

.kpi{
position:relative;
overflow:hidden;

background:rgba(255,255,255,0.75);
backdrop-filter:blur(10px);

padding:20px;
border-radius:14px;

box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.kpi:hover{
box-shadow:
0 10px 25px rgba(79,70,229,.25),
0 0 10px rgba(99,102,241,.15);
}

.kpi::after{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;

background:radial-gradient(
circle,
rgba(99,102,241,0.15),
transparent 70%
);

animation:glowMove 6s linear infinite;
}

@keyframes glowMove{

0%{transform:translateX(-30%) translateY(-30%);}
50%{transform:translateX(30%) translateY(30%);}
100%{transform:translateX(-30%) translateY(-30%);}

}

.kpi-title{
font-size:13px;
color:#777;
}

.kpi-value{
font-size:28px;
font-weight:600;
margin-top:6px;
}

/* CHARTS GRID */

.charts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:20px;
padding:24px;
margin-top:10px;
}

/* CHART CARD */

.chart-card{

background:linear-gradient(
180deg,
rgba(255,255,255,0.85),
rgba(255,255,255,0.6)
);

backdrop-filter:blur(12px);
border-radius:14px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

padding:18px;

display:flex;
flex-direction:column;
height:320px;

transition:all .2s;
}

.chart-card:hover{
transform:translateY(-4px);
box-shadow:0 16px 40px rgba(0,0,0,.12);
}

.chart-title{
font-weight:600;
margin-bottom:12px;
color:#374151;
letter-spacing:.4px;
font-size:14px;
display:flex;
align-items:center;
gap:6px;
}

/* CHART WRAPPER */

.chart-wrapper{
position:relative;
flex:1;
width:100%;
}

.chart-wrapper canvas{
display:block;
width:100% !important;
height:100% !important;
}

/* TABLE */

.table-container{
padding:24px;
}

table{
width:100%;
border-collapse:collapse;

background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);

border-radius:12px;

overflow:hidden;

box-shadow:0 8px 25px rgba(0,0,0,.08);
}

tbody tr:hover{
background:#f8fafc;
}

tbody tr:nth-child(even){
background:#fafafa;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
}

th{
background:#e0e7ff;
color:#1e3a8a;
}

#historyLabel{
white-space:nowrap;
}

canvas{
background:transparent;
}

.chart-card{
position:relative;
overflow:hidden;
}

.chart-card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:4px;

background:linear-gradient(
90deg,
#6366f1,
#22c55e,
#f59e0b,
#ef4444
);

background-size:300% 300%;

animation:gradientMove 6s ease infinite;
}

@keyframes gradientMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.chart-card,
.kpi{
transition:
transform .25s ease,
box-shadow .25s ease;
}

.chart-card:hover,
.kpi:hover{

transform:translateY(-6px) scale(1.01);

box-shadow:
0 18px 40px rgba(0,0,0,.12);

}

@media(max-width:768px){

.header{
flex-direction:column;
gap:10px;
align-items:flex-start;
}

.controls{
width:100%;
justify-content:space-between;
}

.charts{
grid-template-columns:1fr;
}

}

#statusChart {
  height: 200px !important; /* smaller than the card height */
  max-width: 100%;
}

</style>

</head>

<body>

<div class="header">

<div class="title">🚀 Playwright QA Analytics</div>

<div class="controls">

<!-- HISTORY RANGE -->

<div class="dropdown" id="historyDropdown">

<button class="dropdown-btn">
History Range: <span id="historyLabel">All</span> ▾
</button>

<div class="dropdown-menu">

<button data-range="all">All</button>
<button data-range="today">Today</button>
<button data-range="7">Last 7 Days</button>
<button data-range="30">Last 30 Days</button>

</div>

</div>

<!-- ACTIONS -->

<div class="dropdown">

<button class="dropdown-btn">Actions ▾</button>

<div class="dropdown-menu">

<button id="downloadPDF">Download PDF</button>

</div>

</div>

</div>

</div>

<!-- KPI -->

<div class="kpis">

<div class="kpi">
<div class="kpi-title">Total Tests (Executed)</div>
<div class="kpi-value" id="totalTests">0</div>
</div>

<div class="kpi">
<div class="kpi-title">Passed</div>
<div class="kpi-value" id="passedTests">0</div>
</div>

<div class="kpi">
<div class="kpi-title">Failed</div>
<div class="kpi-value" id="failedTests">0</div>
</div>

<div class="kpi">
<div class="kpi-title">Flaky</div>
<div class="kpi-value" id="flakyTests">0</div>
</div>

</div>

<!-- CHARTS -->

<div class="charts">

<div class="chart-card">
<div class="chart-title">📈 Execution Trend</div>
<div class="chart-wrapper">
<canvas id="trendChart"></canvas>
</div>
</div>

<div class="chart-card">
<div class="chart-title">📊 Pass Rate</div>
<div class="chart-wrapper">
<canvas id="passChart"></canvas>
</div>
</div>

<div class="chart-card">
<div class="chart-title">🥧 Status Distribution</div>
<div class="chart-wrapper">
<canvas id="statusChart"></canvas>
</div>
</div>

<div class="chart-card">
<div class="chart-title">⚠️ Flaky Trend</div>
<div class="chart-wrapper">
<canvas id="flakyChart"></canvas>
</div>
</div>

<div class="chart-card">
<div class="chart-title">📉 Pass Rate vs Stability</div>
<div class="chart-wrapper">
<canvas id="qualityChart"></canvas>
</div>
</div>
</div>

<!-- TABLE -->

<div class="table-container">

<h3>Slowest Tests</h3>

<table>

<thead>
<tr>
<th>Test</th>
<th>Status</th>
<th>Date</th>
<th>Duration</th>
</tr>
</thead>

<tbody id="slowTests"></tbody>

</table>

</div>
<div style="text-align:center;padding:20px;color:#6b7280;font-size:12px">
QA Analytics Dashboard • Playwright Automation
</div>
<script>

/* DROPDOWN */

document.querySelectorAll(".dropdown-btn").forEach(btn=>{

btn.onclick=(e)=>{

e.stopPropagation()

const parent=btn.parentElement

document.querySelectorAll(".dropdown").forEach(d=>{
if(d!==parent)d.classList.remove("open")
})

parent.classList.toggle("open")

}

})

document.addEventListener("click",()=>{
document.querySelectorAll(".dropdown").forEach(d=>d.classList.remove("open"))
})

function closeAllDropdowns(){
document.querySelectorAll(".dropdown").forEach(d=>d.classList.remove("open"))
}

/* CHARTS */

let trendChart=new Chart(document.getElementById("trendChart"),{
type:"line",
data:{labels:[],datasets:[{label:"Tests",data:[],borderColor:"#4f6df5"}]},
options:{responsive:true,maintainAspectRatio:false}
})

let passChart=new Chart(document.getElementById("passChart"),{
type:"line",
data:{labels:[],datasets:[{label:"Pass %",data:[],borderColor:"#2ecc71"}]},
options:{responsive:true,maintainAspectRatio:false}
})

let statusChart=new Chart(document.getElementById("statusChart"),{
type:"doughnut",
data:{
labels:["Passed","Failed","Flaky"],
datasets:[{
data:[0,0,0],
backgroundColor:["#2ecc71","#e74c3c","#f1c40f"],
radius:"100%",
hoverOffset:4
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
cutout:"40%",
plugins:{
legend:{
position:"top",
labels:{
boxWidth:12,
padding:20
}
}
}
}
})

let flakyChart=new Chart(document.getElementById("flakyChart"),{
type:"line",
data:{labels:[],datasets:[{label:"Flaky",data:[],borderColor:"#f39c12"}]},
options:{responsive:true,maintainAspectRatio:false}
})

let qualityChart=new Chart(document.getElementById("qualityChart"),{
type:"line",
data:{
labels:[],
datasets:[
{
label:"Pass Rate %",
data:[],
borderColor:"#27ae60",
backgroundColor:"rgba(39,174,96,0.2)",
tension:0.3
},
{
label:"Stability %",
data:[],
borderColor:"#8e44ad",
backgroundColor:"rgba(142,68,173,0.2)",
tension:0.3
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{position:"top"}
}
}
})

let historyData=[]

async function loadDashboard(){

const res=await fetch("./history.json")
historyData=await res.json()

updateDashboard(historyData)

}

function formatDurationWithLabels(start, stop) {
    let duration_ms = stop - start;

    let hours = Math.floor(duration_ms / (1000 * 60 * 60));
    let minutes = Math.floor((duration_ms % (1000 * 60 * 60)) / (1000 * 60));
    let seconds = Math.floor((duration_ms % (1000 * 60)) / 1000);
    let milliseconds = duration_ms % 1000;

    return `${hours} hr ${minutes} min ${seconds} sec ${milliseconds} ms`;
}

// Populate Slowest Tests Table
function populateSlowTests(data) {
    const tbody = document.getElementById("slowTests");
    tbody.innerHTML = ""; // Clear previous rows

    // Collect all results from all entries
    let allResults = [];
    historyData.forEach(entry => {
        if (entry.results && entry.results.length > 0) {
            allResults = allResults.concat(entry.results);
        }
    });

    if (allResults.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 3;
        td.innerText = "No slow tests available";
        td.style.textAlign = "center";
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
    }
    // Sort data by duration descending (assuming each item has duration in ms)
    allResults.sort((a, b) => (b.stop-b.start) - (a.stop-a.start));

    allResults.forEach(test => {
        const tr = document.createElement("tr");

        const tdName = document.createElement("td");
        tdName.innerText = test.name || "-";

        const tdStatus = document.createElement("td");
        tdStatus.innerText = test.status || "-";

        const tdDate = document.createElement("td");
        const dateObject = new Date(test.start);
        tdDate.innerText = dateObject.toLocaleDateString('en-US', { 
    year: 'numeric', 
    month: 'long', 
    day: 'numeric', 
    hour: '2-digit', 
    minute: '2-digit', 
    second: '2-digit',
}) + " " + dateObject.toString().match(/\(([^)]+)\)/)[1] || "-";

        const tdDuration = document.createElement("td");
        // Format duration in ms to hh:mm:ss.ms
        tdDuration.innerText = formatDurationWithLabels(test.start, test.stop) || "-";

        tr.appendChild(tdName);
        tr.appendChild(tdStatus);
        tr.appendChild(tdDate);
        tr.appendChild(tdDuration);

        tbody.appendChild(tr);
    });
}

/* UPDATE DASHBOARD */

function updateKPIs(data) {
    if (!data || data.length === 0) {
        totalTests.innerText = 0;
        passedTests.innerText = 0;
        failedTests.innerText = 0;
        flakyTests.innerText = 0;
        return;
    }

    // Aggregate totals from all filtered entries
    const total = data.reduce((sum, entry) => sum + (entry.total || 0), 0);
    const passed = data.reduce((sum, entry) => sum + (entry.passed || 0), 0);
    const failed = data.reduce((sum, entry) => sum + (entry.failed || 0), 0);
    const flaky = data.reduce((sum, entry) => sum + (entry.flaky || 0), 0);

    totalTests.innerText = total;
    passedTests.innerText = passed;
    failedTests.innerText = failed;
    flakyTests.innerText = flaky;
}

function updateDashboard(data){

updateKPIs(data);

const passedTotal = data.reduce((sum, entry) => sum + (entry.passed || 0), 0);
const total = data.reduce((sum, entry) => sum + (entry.total || 0), 0);
const failedTotal = data.reduce((sum, entry) => sum + (entry.failed || 0), 0);
const flakyTotal = data.reduce((sum, entry) => sum + (entry.flaky || 0), 0);

trendChart.data.labels=data.map(d=>new Date(d.timestamp).toLocaleDateString())
trendChart.data.datasets[0].data=data.map(d=>d.total)
trendChart.update()

passChart.data.labels=data.map(d=>new Date(d.timestamp).toLocaleDateString())
passChart.data.datasets[0].data=data.map(d=>Math.round(d.passed/d.total*100))
passChart.update()

statusChart.data.datasets[0].data = [passedTotal, failedTotal, flakyTotal];
statusChart.update();

flakyChart.data.labels=data.map(d=>new Date(d.timestamp).toLocaleDateString())
flakyChart.data.datasets[0].data=data.map(d=>d.flaky)
flakyChart.update()

qualityChart.data.labels=data.map(d=>new Date(d.timestamp).toLocaleDateString())

qualityChart.data.datasets[0].data=data.map(d=>
Math.round((d.passed/d.total)*100)
)

qualityChart.data.datasets[1].data=data.map(d=>
Math.round((d.passed/(d.total-d.flaky))*100)
)

qualityChart.update()

// Populate Slowest Tests
if (data.length > 0) {
  populateSlowTests(data);
} 


}

/* HISTORY FILTER */

document.querySelectorAll("#historyDropdown .dropdown-menu button").forEach(btn=>{

btn.onclick=(e)=>{
e.stopPropagation();
const range=btn.dataset.range
historyLabel.innerText=btn.innerText

let filtered=[...historyData]
const now=new Date()

if(range==="today"){
filtered=historyData.filter(r=>new Date(r.timestamp).toDateString()===now.toDateString())
}

if(range==="7"){
filtered=historyData.filter(r=>now-new Date(r.timestamp)<7*86400000)
}

if(range==="30"){
filtered=historyData.filter(r=>now-new Date(r.timestamp)<30*86400000)
}

// Update charts and slow tests table with filtered data
        if (filtered.length > 0) {
            updateDashboard(filtered);
            populateSlowTests(filtered); // <-- update slow tests here
            updateKPIs(filtered);
        } else {
            // If no data, clear charts and slow tests
            updateDashboard([]);
            populateSlowTests([]);
            updateKPIs([]);
        }

closeAllDropdowns()

}

})

/* DOWNLOAD */

document.getElementById("downloadPDF").onclick = () => {
  // Close dropdowns
  closeAllDropdowns();

  // Select the element to export (full dashboard)
  const element = document.body; // or a wrapper div if you have one

  const opt = {
    margin:       10,
    filename:     'qa-dashboard.pdf',
    image:        { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: null },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save();
};

loadDashboard()

</script>
</body>
</html>
