<!DOCTYPE html>
<html>
<head>
  <title>Automation Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: #1a73e8; }
    canvas { max-width: 100%; height: 400px; }
    .stats { margin: 20px 0; }
    .stats div { margin-bottom: 5px; }
  </style>
</head>
<body>

<h2>Automation Trend Dashboard</h2>

<div class="stats" id="summary"></div>

<canvas id="trendChart"></canvas>

<canvas id="flakyChart"></canvas>

<h3>Flaky Tests</h3>
<ul id="flakyList"></ul>

<script>
async function fetchHistory() {
  const response = await fetch('./history.json');
  if (!response.ok) throw new Error('Cannot fetch history.json');
  return response.json();
}

fetchHistory().then(data => {
  // Use timestamp and format as date
  const labels = data.map(r => new Date(r.timestamp).toLocaleDateString());
  // Parse strings to numbers for charts
  const passRate = data.map(r => parseFloat(r.passRate));
  const failedTests = data.map(r => r.failed);
  const stabilityScore = data.map(r => parseFloat(r.stabilityScore));
  const totalTests = data.map(r => r.total);
  const flaky = data.map(d => d.flaky);

  // Display summary of last run
  const lastRun = data[data.length - 1];
  const summary = document.getElementById('summary');
  summary.innerHTML = `
    <div><strong>Total Tests:</strong> ${lastRun.total}</div>
    <div><strong>Passed:</strong> ${lastRun.passed}</div>
    <div><strong>Failed:</strong> ${lastRun.failed}</div>
    <div><strong>Pass Rate:</strong> ${lastRun.passRate}</div>
    <div><strong>Flaky Tests:</strong> ${lastRun.flaky}</div>
    <div><strong>Stability Score:</strong> ${lastRun.stabilityScore}</div>
  `;

  const flakyList = document.getElementById('flakyList');
  flakyList.innerHTML = '';
  if (lastRun.flakyTests.length > 0) {
    lastRun.flakyTests.forEach(t => {
      const li = document.createElement('li');
      li.textContent = t;
      flakyList.appendChild(li);
    });
  } else {
    flakyList.textContent = 'No flaky tests';
  }

  // Draw trend chart
  const ctx = document.getElementById('trendChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Pass Rate (%)',
          data: passRate,
          borderColor: '#28a745',
          backgroundColor: 'rgba(40, 167, 69, 0.2)',
          fill: true,
          tension: 0.3
        },
        {
          label: 'Failed Tests',
          data: failedTests,
          borderColor: '#dc3545',
          backgroundColor: 'rgba(220, 53, 69, 0.2)',
          fill: true,
          tension: 0.3
        },
        {
          label: 'Stability Score (%)',
          data: stabilityScore,
          borderColor: '#ffc107',
          backgroundColor: 'rgba(255, 193, 7, 0.2)',
          fill: true,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'top' },
        title: { display: true, text: 'Automation Test Trends' }
      },
      scales: { y: { beginAtZero: true } }
    }
  });

  // Flaky Tests Trend
      new Chart(document.getElementById("flakyChart"), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Flaky', data: flaky, backgroundColor: 'orange' },
            { label: 'Total', data: totalTests, backgroundColor: 'blue', opacity: 0.2 }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' },
            title: { display: true, text: 'Flaky Tests Trends' }
          },
          scales: { y: { beginAtZero: true } }
        }
      });


}).catch(err => console.error('Error loading history.json:', err));
</script>

</body>
</html>
