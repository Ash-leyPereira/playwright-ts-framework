name: Playwright Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm run test
      continue-on-error: true

    - name: Generate Allure Report
      if: always()
      run: npx allure generate reports/allure-results --clean -o reports/allure-report

    - name: Deploy Allure Report
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: reports/allure-report

    - name: Update README with automation stats
      run: node scripts/update-readme.js

    - name: Commit README update
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add README.md
        git commit -m "docs: update automation stats" || echo "No changes"
        git push
    
    - name: Detect flaky tests
      run: node scripts/flaky-tests.js

    - name: Upload flaky test report
      uses: actions/upload-artifact@v4
      with:
        name: flaky-tests
        path: reports/flaky-tests.md