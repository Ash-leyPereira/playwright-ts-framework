name: Playwright Tests

on:
  push:
    branches: [ main, master ]

  schedule:
    # Runs every day at 06:30 UTC (12 PM IST)
    - cron: '30 6 * * *'

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm run test
      continue-on-error: true

    - name: Generate Flaky Test Report
      run: node scripts/flaky-tests.js

    - name: Update Persistent History
      run: node scripts/generate-dashboard.js

    - name: Generate Allure Report
      if: always()
      run: |
        npx allure generate reports/allure-results --clean -o reports/allure-report

    - name: Update README with latest stats
      run: node scripts/update-readme.js


    # ✅ Copy dashboard folder preserving structure
    - name: Copy QA Dashboard
      run: |
        mkdir -p reports/allure-report/dashboard
        cp -r dashboard/* reports/allure-report/dashboard/


    # Copy flaky test analysis
    - name: Copy Flaky Test Report
      run: |
        cp reports/flaky-tests.md reports/allure-report/dashboard/


    # Deploy to GitHub Pages
    - name: Deploy All Reports & Dashboard
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./reports/allure-report
        publish_branch: gh-pages
        user_name: "github-actions"
        user_email: "github-actions@github.com"
        keep_files: true


    - name: Commit Dashboard History Updates
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add README.md
        git add dashboard/data/history.json
        git commit -m "update dashboard history & stats" || echo "No changes"
        git push