name: Playwright Tests

on:
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:

    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm run test
      continue-on-error: true

    - name: Generate Flaky Test Report
      run: node scripts/flaky-tests.js

    - name: Generate Allure Report
      if: always()
      run: |
        npx allure generate reports/allure-results --clean -o reports/allure-report

    - name: Update README with latest stats
      run: node scripts/update-readme.js

    - name: Copy Analytics to Allure Report Folder
      run: |
        mkdir -p reports/allure-report/analytics
        cp analytics/dashboard.html reports/allure-report/analytics/dashboard.html
        cp analytics/history.json reports/allure-report/analytics/history.json
        cp reports/flaky-tests.md reports/allure-report/analytics/flaky-tests.md

    - name: Deploy All Reports & Analytics to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4.0.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./reports/allure-report
        publish_branch: gh-pages
        user_name: "github-actions"
        user_email: "github-actions@github.com"
        keep_files: true

    - name: Commit Analytics and README Updates
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add README.md
        git add analytics/history.json
        git commit -m "update dashboard & stats" || echo "No changes"
        git push